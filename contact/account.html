
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Account Application</title>
  <link rel="stylesheet" href="/tfcwebsite/styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div id="header-placeholder" class="header-wrapper"></div>

<section class="section">
  <h1 class="reveal">Account Application</h1>

  <iframe 
    class="reveal reveal-delay-1"
    width="100%" 
    height="900px" 
    src="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=nngWXPFKFUOSvedAYH2YSnjXP0tp9OhCuwv0KN6kQpZUN0JOWVZOOUhCWkw1WjlQTkM4WEJIRFNVWS4u&embed=true">
  </iframe>

</section>

<div id="footer-placeholder"></div>

 <script src="../main.js"></script>

<!-- SCRIPTS -->
<script>


/* HEADER */
fetch('/tfcwebsite/partials/header.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
  });

/* FOOTER */
fetch('/tfcwebsite/partials/footer.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;
    // ✅ INIT NAV AFTER HEADER LOADS
    if (typeof initNav === 'function') {
      initNav();
    }    
  });

/* ✅ WAIT FOR RENDER PROPERLY */

window.addEventListener('DOMContentLoaded', () => {
  initReveal();
});

</script>


</body>
</html>
