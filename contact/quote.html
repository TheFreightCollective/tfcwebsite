<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Request Quote</title>
  <link rel="stylesheet" href="/tfcwebsite/styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div id="header-placeholder" class="header-wrapper"></div>

<section class="section">
  <h1 class="reveal">Request Quote</h1>
</section>

<div id="footer-placeholder"></div>
 <script src="../main.js"></script>

<!-- SCRIPTS -->
<script>


/* HEADER */
fetch('/tfcwebsite/partials/header.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
    // ✅ INIT NAV AFTER HEADER LOADS
    if (typeof initNav === 'function') {
      initNav();
    }    
  });

/* FOOTER */
fetch('/tfcwebsite/partials/footer.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;
  });

/* ✅ WAIT FOR RENDER PROPERLY */

window.addEventListener('DOMContentLoaded', () => {
  initReveal();
});

</script>

</body>
</html>
