
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="../styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div id="header-placeholder" class="header-wrapper"></div>

<section class="section">

  <h1 class="reveal">Get in Touch</h1>

  <p class="reveal reveal-delay-1">
    Choose the best option below and our team will assist you promptly.
  </p>

  <div class="services-grid">

    <!-- MESSAGE -->
    <a href="contact/message.html" class="service-card reveal reveal-delay-1">
      <img src="../assets/images/icons/brainpower.png" class="service-icon" alt="">
      <h3>Send Message</h3>
      <p>General enquiries, questions or support.</p>
    </a>

    <!-- QUOTE -->
    <a href="contact/quote.html" class="service-card reveal reveal-delay-2">
      <img src="../assets/images/icons/pointtopoint.png" class="service-icon" alt="">
      <h3>Request a Quote</h3>
      <p>Get pricing and availability for your job.</p>
    </a>

    <!-- ACCOUNT -->
    <a href="contact/account.html" class="service-card reveal reveal-delay-3">
      <img src="../assets/images/icons/roundtable.png" class="service-icon" alt="">
      <h3>Account Application</h3>
      <p>Apply for a business trading account.</p>
    </a>

  </div>

</section>

<div id="footer-placeholder"></div>

<script>

// ===============================
// LOAD HEADER
// ===============================
fetch('partials/header.html')
  .then(res => res.text())
  .then(data => {
    const headerEl = document.getElementById('header-placeholder');
    if (headerEl) headerEl.innerHTML = data;
  });

// ===============================
// LOAD FOOTER
// ===============================
fetch('partials/footer.html')
  .then(res => res.text())
  .then(data => {
    const footerEl = document.getElementById('footer-placeholder');
    if (footerEl) footerEl.innerHTML = data;
  });

// ===============================
// MOBILE NAV (AFTER LOAD)
// ===============================
document.addEventListener("DOMContentLoaded", () => {

  const menuToggle = document.querySelector('.menu-toggle');
  const navLinks = document.querySelector('.nav-links');

  if (menuToggle && navLinks) {
    menuToggle.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });
  }

  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks?.classList.remove('active');
    });
  });

});

 



</script>

</body>
</html>
